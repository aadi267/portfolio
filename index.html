    <!-- Critical inline CSS for faster render -->
    <style>
      /* Critical CSS for above-the-fold content */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      
      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      body {
        background: #000000;
        color: #ffffff;
        overflow-x: hidden;
        min-height: 100vh;
      }
      
      #root {
        min-height: 100vh;
        background: radial-gradient(ellipse at center, #0a0e2a 0%, #000000 70%);
      }
      
      /* Prevent layout shift */
      img {
        max-width: 100%;
        height: auto;
        display: block;
      }
      
      /* Critical typography */
      h1 {
        font-size: clamp(2.5rem, 8vw, 5rem);
        font-weight: 700;
        line-height: 1.2;
      }
      
      /* Hide elements until JS loads */
      [data-lazy] {
        opacity: 0;
        transition: opacity 0.3s;
      }
      
      [data-lazy].loaded {
        opacity: 1;
      }
    </style>
